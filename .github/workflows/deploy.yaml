name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-studio:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Studio)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Studio
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Worker)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/zucatti/studio-worker
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-push-studio, build-and-push-worker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Configure nginx ingress for forwarded headers
        run: |
          kubectl patch configmap ingress-nginx-controller -n ingress-nginx --type merge \
            -p '{"data":{"use-forwarded-headers":"true","compute-full-forwarded-for":"true","proxy-real-ip-cidr":"0.0.0.0/0"}}' \
            || echo "ConfigMap patch skipped or already applied"

      - name: Apply ingress
        run: |
          kubectl apply -f k8s/ingress.yaml -n ia-studio

      - name: Restart nginx ingress if configmap changed
        run: |
          kubectl rollout restart deployment/ingress-nginx-controller -n ingress-nginx || true

      - name: Deploy Redis (if not exists)
        run: |
          kubectl apply -f k8s/redis-pvc.yaml -n ia-studio || true
          kubectl apply -f k8s/redis-deployment.yaml -n ia-studio || true
          kubectl apply -f k8s/redis-service.yaml -n ia-studio || true

      - name: Deploy Studio application
        run: |
          kubectl rollout restart deployment/studio -n ia-studio
          kubectl rollout status deployment/studio -n ia-studio --timeout=120s

      - name: Deploy Worker
        run: |
          kubectl apply -f k8s/worker-deployment.yaml -n ia-studio || true
          kubectl rollout restart deployment/studio-worker -n ia-studio || true
          kubectl rollout status deployment/studio-worker -n ia-studio --timeout=120s || true
