apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: default
spec:
  # Every day at 3am UTC
  schedule: "0 3 * * *"
  # Keep last 3 successful jobs for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      # Auto-delete job after 1 day
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            # Image with both pg_dump and aws-cli
            image: amazon/aws-cli:latest
            command: ["/bin/bash", "-c"]
            args:
              - |
                set -e

                echo "========================================="
                echo "Database Backup - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                echo "========================================="

                # Install pg_dump (PostgreSQL client)
                echo "[Backup] Installing PostgreSQL client..."
                yum install -y postgresql15 > /dev/null 2>&1

                # Generate backup filename
                TIMESTAMP=$(date -u +%Y-%m-%d_%H-%M-%S)
                BACKUP_FILE="backups/db_${TIMESTAMP}.sql.gz"

                echo "[Backup] Starting pg_dump..."

                # Dump and compress in one pipeline, upload directly to S3/B2
                pg_dump --no-owner --no-acl --clean --if-exists "$DATABASE_URL" | gzip -9 | \
                  aws s3 cp - "s3://${S3_BUCKET}/${BACKUP_FILE}" \
                    --endpoint-url "https://${S3_ENDPOINT}" \
                    --content-type "application/gzip" \
                    --content-encoding "gzip"

                echo "[Backup] Uploaded: s3://${S3_BUCKET}/${BACKUP_FILE}"

                # Cleanup old backups (older than 7 days)
                echo "[Backup] Cleaning up old backups..."
                CUTOFF_DATE=$(date -u -d "7 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-7d +%Y-%m-%d)

                aws s3 ls "s3://${S3_BUCKET}/backups/" --endpoint-url "https://${S3_ENDPOINT}" | \
                while read -r line; do
                  FILE=$(echo "$line" | awk '{print $4}')
                  if [[ "$FILE" =~ ^db_([0-9]{4}-[0-9]{2}-[0-9]{2})_ ]]; then
                    FILE_DATE="${BASH_REMATCH[1]}"
                    if [[ "$FILE_DATE" < "$CUTOFF_DATE" ]]; then
                      echo "[Backup] Deleting old backup: $FILE"
                      aws s3 rm "s3://${S3_BUCKET}/backups/${FILE}" --endpoint-url "https://${S3_ENDPOINT}"
                    fi
                  fi
                done

                # List remaining backups
                echo ""
                echo "[Backup] Current backups:"
                aws s3 ls "s3://${S3_BUCKET}/backups/" --endpoint-url "https://${S3_ENDPOINT}" | grep "db_" | tail -10

                echo ""
                echo "========================================="
                echo "Backup completed successfully"
                echo "========================================="
            env:
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: studio-secrets
                    key: DATABASE_URL
              - name: S3_ENDPOINT
                valueFrom:
                  secretKeyRef:
                    name: studio-secrets
                    key: S3_ENDPOINT
              - name: S3_BUCKET
                valueFrom:
                  secretKeyRef:
                    name: studio-secrets
                    key: S3_BUCKET
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: studio-secrets
                    key: S3_KEY
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: studio-secrets
                    key: S3_SECRET
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
